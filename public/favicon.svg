  <!-- Gold ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#D4AF37" stroke-width="1.2"/>
  <!-- G -->
  <text x="17" y="40" font-family="Georgia, serif" font-size="24" font-weight="300" fill="#D4AF37" text-anchor="middle">G</text>
  <!-- Divider dot -->
